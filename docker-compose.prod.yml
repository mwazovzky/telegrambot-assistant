services:
  app:
    container_name: app
    image: mwazovzky/telegrambot-assistant
    env_file:
      - .env

  redis:
    container_name: redis
    image: redis:7.4.0-alpine
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env

networks:
  default:
    name: telegram-assistant
