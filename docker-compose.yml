services:
  app:
    container_name: app
    build: .
    env_file:
      - .env

  redis:
    container_name: redis
    image: redis:7.4.0-alpine
    ports:
      - 6379:6379
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis_data:

networks:
  default:
    name: telegram-assistant
